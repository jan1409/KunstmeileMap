<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        color: #ffffff;
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          'Helvetica Neue',
          Arial,
          sans-serif;
        font-feature-settings: 'cv11', 'ss01';
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      body {
        width: 1200px;
        height: 630px;
        position: relative;
        overflow: hidden;
        background:
          radial-gradient(circle at 30% 35%, rgba(120, 80, 200, 0.18), transparent 55%),
          radial-gradient(circle at 75% 70%, rgba(80, 160, 220, 0.14), transparent 55%),
          #0a0a0a;
      }
      .stage {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        padding: 80px 96px;
        gap: 28px;
      }
      .eyebrow {
        font-size: 22px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.55);
        font-weight: 500;
      }
      h1 {
        font-size: 132px;
        font-weight: 700;
        margin: 0;
        line-height: 0.95;
        letter-spacing: -0.04em;
      }
      .subtitle {
        font-size: 36px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.78);
        line-height: 1.25;
        max-width: 850px;
      }
      .footer {
        position: absolute;
        bottom: 60px;
        left: 96px;
        right: 96px;
        display: flex;
        justify-content: space-between;
        font-size: 22px;
        color: rgba(255, 255, 255, 0.5);
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="eyebrow">Kunstoffene Türen · Sittensen</div>
      <h1>Kunstmeile<br />2026</h1>
      <p class="subtitle">Photoreale 3D-Karte aller Stände — direkt im Browser begehbar.</p>
    </div>
    <div class="footer">
      <span>kunstmeile · open-air</span>
      <span>2026</span>
    </div>
  </body>
</html>
